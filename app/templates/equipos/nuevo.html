{% extends 'layouts/base.html' %}

{% block content %}

<section class="content">

    <div class="container-fluid">

        <div class="card card-primary">

            <div class="card-header">

                <h3 class="card-title">
                    Nuevo Equipo
                </h3>

            </div>

            <form action="/equipos/guardar" method="POST">

                <div class="card-body">

                    <div class="form-group">

                        <label>Hostname</label>

                        <input type="text"
                               name="hostname"
                               class="form-control"
                               required>

                    </div>

                    <div class="form-group">

                        <label>IP</label>

                        <input type="text"
                               name="ip"
                               class="form-control"
                               required>

                    </div>

                    <div class="form-group">

                        <label>Sistema Operativo</label>

                        <input type="text"
                               name="sistema_operativo"
                               class="form-control"
                               required>

                    </div>

                    <div class="form-group">

                        <label>Estado</label>

                        <select name="estado"
                                class="form-control">

                            <option>Online</option>
                            <option>Offline</option>
                            <option>Mantenimiento</option>

                        </select>

                    </div>

                </div>

                <div class="card-footer">

                    <button type="submit"
                            class="btn btn-primary">

                        Guardar Equipo

                    </button>

                </div>

            </form>

        </div>

    </div>

</section>

{% endblock %}
